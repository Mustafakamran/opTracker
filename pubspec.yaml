name: optracker
description: A smart payment tracker that monitors your online transactions from notifications.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.0.0

  # Database
  sqflite: ^2.3.2
  path: ^1.8.3
  path_provider: ^2.1.2

  # Authentication
  google_sign_in: ^6.2.1
  local_auth: ^2.1.8
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  crypto: ^3.0.3

  # Notifications
  notification_listener_service: ^0.3.1

  # UI & Design
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1

  # Charts
  fl_chart: ^0.66.2

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  collection: ^1.18.0
  equatable: ^2.0.5
  json_annotation: ^4.8.1
  pattern_lock: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
