name: optracker
description: A smart payment tracker that monitors your online transactions from notifications.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9

  # Navigation
  go_router: ^13.0.0

  # Database
  sqflite: ^2.3.2
  path: ^1.9.0
  path_provider: ^2.1.2

  # Authentication
  google_sign_in: ^6.2.1
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  crypto: ^3.0.3

  # Notifications
  notification_listener_service: ^0.3.1

  # UI & Design
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  lucide_icons: ^0.257.0

  # Charts
  fl_chart: ^0.66.2

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
