name: Build APK

on:
  push:
    branches:
      - claude/payment-tracker-app-52VSE
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Generate missing Android build files
        run: |
          flutter create --org com.optracker --project-name optracker /tmp/flutter_scaffold
          cp -r /tmp/flutter_scaffold/android/gradle android/
          cp /tmp/flutter_scaffold/android/gradlew android/
          cp /tmp/flutter_scaffold/android/gradlew.bat android/
          chmod +x android/gradlew
          sed -i 's|gradle-.*-all.zip|gradle-8.7-all.zip|' android/gradle/wrapper/gradle-wrapper.properties
          flutter pub get --directory=/tmp/flutter_scaffold || true
          if [ -f /tmp/flutter_scaffold/android/local.properties ]; then
            cp /tmp/flutter_scaffold/android/local.properties android/local.properties
          fi

      # Generate a release signing key so Play Protect doesn't block the APK.
      # For production, use GitHub Secrets to store a persistent keystore.
      - name: Generate signing keystore
        run: |
          keytool -genkeypair -v \
            -keystore android/app/release-key.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias optracker \
            -storepass optracker2024 \
            -keypass optracker2024 \
            -dname "CN=OpTracker, OU=Mobile, O=OpTracker, L=US, ST=CA, C=US"

          cat > android/key.properties << 'KEYEOF'
          storePassword=optracker2024
          keyPassword=optracker2024
          keyAlias=optracker
          storeFile=release-key.jks
          KEYEOF

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Build release APK (signed)
        run: flutter build apk --release

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: optracker-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: optracker-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
