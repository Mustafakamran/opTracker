name: Build APK

on:
  push:
    branches:
      - claude/payment-tracker-app-52VSE
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      # The project was hand-assembled without flutter create,
      # so we need to generate the Gradle wrapper and local.properties
      - name: Generate missing Android build files
        run: |
          # Create a temp Flutter project to get proper Android scaffolding
          flutter create --org com.optracker --project-name optracker /tmp/flutter_scaffold

          # Copy Gradle wrapper (essential for building)
          cp -r /tmp/flutter_scaffold/android/gradle android/
          cp /tmp/flutter_scaffold/android/gradlew android/
          cp /tmp/flutter_scaffold/android/gradlew.bat android/
          chmod +x android/gradlew

          # Let Flutter generate local.properties with SDK paths
          flutter pub get --directory=/tmp/flutter_scaffold || true
          if [ -f /tmp/flutter_scaffold/android/local.properties ]; then
            cp /tmp/flutter_scaffold/android/local.properties android/local.properties
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: optracker-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: optracker-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
